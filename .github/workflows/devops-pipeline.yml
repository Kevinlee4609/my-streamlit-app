name: 🚀 Production CI-CD Build & Push to Docker Hub

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    # 1. ดึงโค้ดโปรเจกต์จากคลัง GitHub
    - name: 📥 Check out repository code
      uses: actions/checkout@v4

    # 2. สั่งหุ่นยนต์ล็อกอินเข้า Docker Hub ผ่านกุญแจความลับที่เราฝากไว้ในตู้เซฟ
    - name: 🔑 Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 3. สั่งบิ้วด์เลเยอร์ Docker และผลักดันขึ้นคลังกลางออโต้เลยค๊าา!
    - name: 🐳 Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        # ⚠️ ด่วน! เปลี่ยนคำว่า kevinlee4609 เป็น Username Docker Hub จริงของคุณคิวน้าา
        tags: kevinlee4609/my-streamlit-app:latest
